name: temporizador_poker
description: Temporizador de Poker a Pantalla Completa.
publish_to: 'none'
version: 0.2.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Para evitar que la pantalla se apague
  wakelock_plus: ^1.1.4
  # Para reproducir sonidos del sistema sin requerir assets extra
  just_audio: ^0.9.42
  shared_preferences: ^2.5.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/beep.wav
    - assets/alarm.wav
    - assets/voice_10.mp3
    - assets/voice_5.mp3
    - assets/voice_4.mp3
    - assets/voice_3.mp3
    - assets/voice_2.mp3
    - assets/voice_1.mp3
    - assets/voice_termino.mp3
    - assets/poker_bg.png
